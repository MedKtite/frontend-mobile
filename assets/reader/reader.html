<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; background: #faf8f5;
      overflow-y: auto; -webkit-touch-callout: none;
    }
    #viewer { min-height: 100%; width: 100%; overflow-y: auto; }
    #selection-toolbar {
      position: fixed; z-index: 2147483647; left: 50%; bottom: 16px;
      transform: translateX(-50%); display: none; align-items: center;
      height: 60px; padding: 0 16px; border-radius: 30px;
      background: var(--toolbar-bg, #1c1c1e);
      box-shadow: 0 12px 28px rgba(0, 0, 0, .3);
      gap: 6px; white-space: nowrap;
    }
    #selection-toolbar.visible { display: flex; }
    #selection-toolbar button {
      appearance: none; border: 0; background: transparent;
      color: var(--toolbar-fg, #faf8f5); font: 500 13px system-ui, sans-serif;
      min-width: 38px; height: 44px; padding: 0 7px; cursor: pointer;
    }
    #selection-toolbar button.dot {
      min-width: 28px; width: 28px; padding: 0; position: relative;
    }
    #selection-toolbar button.dot::after {
      content: ''; position: absolute; width: 22px; height: 22px;
      border-radius: 50%; left: 3px; top: 11px; background: var(--dot);
    }
    #selection-toolbar .divider {
      width: 1px; height: 24px; margin: 0 4px;
      background: var(--toolbar-fg, #faf8f5); opacity: .5;
    }
  </style>
</head>
<body>
  <div id="viewer"></div>
  <div id="selection-toolbar" role="toolbar" aria-label="Selected text actions">
    <button class="dot" style="--dot:#ff6b6b" data-tag="urgent" aria-label="Urgent"></button>
    <button class="dot" style="--dot:#ffa94d" data-tag="curious" aria-label="Curious"></button>
    <button class="dot" style="--dot:#ffd93d" data-tag="resonant" aria-label="Resonant"></button>
    <button class="dot" style="--dot:#6bcb77" data-tag="beautiful" aria-label="Beautiful"></button>
    <button class="dot" style="--dot:#4d96ff" data-tag="reference" aria-label="Reference"></button>
    <span class="divider"></span>
    <button data-action="note">Note</button>
    <button data-action="tag">Tag</button>
    <button data-action="copy">Copy</button>
  </div>
  <script src="jszip.min.js"></script>
  <script src="epub.min.js"></script>
  <script>
    var book, rendition, locationsReady = false;
    var excludedSpineIndexes = {};
    var gutenbergInitialTarget = null;
    var initialStartCfi = null;
    var initialGutenbergRedirectPending = false;
    var selecting = false;
    var selectionToolbar = document.getElementById('selection-toolbar');

    function hasNativeFlutterPalette() {
      return typeof ReaderChannel !== 'undefined' &&
        ReaderChannel && typeof ReaderChannel.postMessage === 'function';
    }

    function showSelectionToolbar() {
      // Mobile draws the token-bound Flutter HighlightPalette above the
      // selection. The HTML toolbar is the web fallback only; showing both
      // produces the duplicate top/bottom palettes.
      if (hasNativeFlutterPalette()) return;
      selectionToolbar.classList.add('visible');
    }
    function hideSelectionToolbar() {
      selectionToolbar.classList.remove('visible');
    }

    // Keep pressing the toolbar from collapsing the selection before its
    // action reaches Flutter. The actual click is still delivered normally.
    selectionToolbar.addEventListener('pointerdown', function (ev) {
      ev.preventDefault();
    });
    selectionToolbar.addEventListener('touchstart', function (ev) {
      ev.preventDefault();
    }, { passive: false });
    selectionToolbar.addEventListener('click', function (ev) {
      var button = ev.target.closest('button');
      if (!button) return;
      var tag = button.getAttribute('data-tag');
      post(tag
        ? { type: 'paletteAction', action: 'quickTag', tag: tag }
        : { type: 'paletteAction', action: button.getAttribute('data-action') });
    });

    function hexToRgba(hex, a) {
      var n = parseInt(hex.slice(1), 16);
      return 'rgba(' + (n >> 16 & 255) + ',' + (n >> 8 & 255) + ',' + (n & 255) + ',' + a + ')';
    }

    // EPUBs bring arbitrary author CSS. Some define a red `::selection`
    // foreground with more specificity than epub.js theme rules. Install one
    // final, deliberately high-specificity rule in every content document so
    // selection always follows the active reader palette.
    function installSelectionCss(contents) {
      try {
        var doc = contents.document;
        if (!doc || !doc.head) return;
        var style = doc.getElementById('marginalia-selection-theme');
        if (!style) {
          style = doc.createElement('style');
          style.id = 'marginalia-selection-theme';
          doc.head.appendChild(style);
        }
        var selector =
          'html:not(#marginalia-selection-guard)::selection,' +
          'body:not(#marginalia-selection-guard)::selection,' +
          'html body *:not(#marginalia-selection-guard)::selection';
        var mozSelector =
          'html:not(#marginalia-selection-guard)::-moz-selection,' +
          'body:not(#marginalia-selection-guard)::-moz-selection,' +
          'html body *:not(#marginalia-selection-guard)::-moz-selection';
        var declaration =
          'background-color:' + hexToRgba(theme.sel, 0.28) + ' !important;' +
          'color:' + theme.fg + ' !important;' +
          '-webkit-text-fill-color:' + theme.fg + ' !important;';
        var readerTextSelector =
          'html body:not(#marginalia-reader-color-guard),' +
          'html body *:not(#marginalia-reader-color-guard):not(svg):not(path)';
        var readerTextDeclaration =
          'color:' + theme.fg + ' !important;' +
          '-webkit-text-fill-color:' + theme.fg + ' !important;';
        style.textContent =
          readerTextSelector + '{' + readerTextDeclaration + '}' +
          selector + '{' + declaration + '}' +
          mozSelector + '{' + declaration + '}';
      } catch (e) {}
    }

    // Figma 237:2 — selecting text washes it in the reader accent.
    function applySelectionCss() {
      if (!rendition) return;
      try {
        rendition.getContents().forEach(function (c) {
          installSelectionCss(c);
        });
      } catch (e) {}
    }

    // Live check across rendered sections — covers the window between the
    // native selection starting and epub.js's debounced 'selected' event.
    function hasSelection() {
      try {
        var cs = rendition.getContents();
        for (var i = 0; i < cs.length; i++) {
          var s = cs[i].window.getSelection();
          if (s && !s.isCollapsed && s.toString().trim()) return true;
        }
      } catch (e) {}
      return false;
    }
    var theme = { bg: '#faf8f5', fg: '#1c1c1e', font: 'serif', size: 18, line: 1.65, sel: '#2b4a6f' };

    // Dual-host bridge: inside the mobile WebView, ReaderChannel exists (a
    // webview_flutter JS channel); inside the web build's iframe it doesn't,
    // and messages go to the parent Flutter page instead.
    function post(o) {
      var s = JSON.stringify(o);
      try { ReaderChannel.postMessage(s); return; } catch (e) {}
      try { window.parent.postMessage(s, '*'); } catch (e) {}
    }

    // Web host calls in via postMessage {cmd, args} (the WebView host calls
    // window.* directly via runJavaScript — both paths hit the same functions).
    window.addEventListener('message', function (ev) {
      var d = ev.data;
      if (typeof d === 'string') {
        try { d = JSON.parse(d); } catch (e) { return; }
      }
      if (!d || typeof d.cmd !== 'string') return;
      var fn = window[d.cmd];
      if (typeof fn === 'function') fn.apply(null, d.args || []);
    });

    // Anything epub.js throws outside our own chains still reaches Dart —
    // fatal before first render, log noise after.
    window.onerror = function (msg) { post({ type: 'jserror', message: String(msg) }); };
    window.addEventListener('unhandledrejection', function (ev) {
      post({ type: 'jserror', message: String(ev.reason) });
    });

    function b64ToBuffer(b64) {
      var s = atob(b64), n = s.length, a = new Uint8Array(n);
      for (var i = 0; i < n; i++) a[i] = s.charCodeAt(i);
      return a.buffer;
    }

    function applyTheme() {
      if (!rendition) return;
      rendition.themes.override('color', theme.fg);
      rendition.themes.override('background', theme.bg);
      rendition.themes.override('font-family', theme.font);
      rendition.themes.override('line-height', String(theme.line));
      rendition.themes.fontSize(theme.size + 'px');
      document.body.style.background = theme.bg;
      document.documentElement.style.setProperty('--toolbar-bg', theme.fg);
      document.documentElement.style.setProperty('--toolbar-fg', theme.bg);
      applySelectionCss();
    }

    function spineItems() {
      return book && book.spine && book.spine.spineItems
        ? book.spine.spineItems : [];
    }

    function markSpineExcluded(index) {
      excludedSpineIndexes[index] = true;
    }

    function nextReadableSpineTarget(afterIndex) {
      var items = spineItems();
      for (var i = afterIndex + 1; i < items.length; i++) {
        if (!excludedSpineIndexes[i]) return items[i].href;
      }
      return null;
    }

    function previousReadableSpineTarget(beforeIndex) {
      var items = spineItems();
      for (var i = beforeIndex - 1; i >= 0; i--) {
        if (!excludedSpineIndexes[i]) return items[i].href;
      }
      return null;
    }

    function displayTargetForSavedCfi(startCfi) {
      if (!startCfi) return gutenbergInitialTarget || undefined;
      try {
        var section = book.spine.get(startCfi);
        if (section && excludedSpineIndexes[section.index]) {
          var items = spineItems();
          return section.index >= items.length / 2
            ? previousReadableSpineTarget(section.index)
            : (gutenbergInitialTarget || nextReadableSpineTarget(section.index));
        }
      } catch (e) {}
      return startCfi;
    }

    // Gutenberg's current EPUB generator normally puts its legal opening and
    // closing pages in pg-header / pg-footer spine items. Older exports put
    // the marker and the actual book in one XHTML document, so filename-only
    // filtering is not enough.
    function blockAfterGutenbergStart(doc) {
      try {
        var walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT);
        var markerNode = null, node;
        while ((node = walker.nextNode())) {
          if ((node.nodeValue || '').toLowerCase().indexOf(
              'start of the project gutenberg ebook') !== -1) {
            markerNode = node;
            break;
          }
        }
        if (!markerNode) return null;

        var blocks = doc.body.querySelectorAll(
          'h1,h2,h3,h4,h5,h6,p,blockquote,pre,figure,table,section,article');
        for (var i = 0; i < blocks.length; i++) {
          var block = blocks[i];
          var relation = markerNode.compareDocumentPosition(block);
          var text = (block.textContent || '').trim().toLowerCase();
          if ((relation & Node.DOCUMENT_POSITION_FOLLOWING) && text &&
              text.indexOf('start of the project gutenberg ebook') === -1) {
            return block;
          }
        }
      } catch (e) {}
      return null;
    }

    // Android WebView can render a section even when epub.js's pre-display
    // section loader could not inspect it. This second pass runs against the
    // document that is actually on screen, then replaces only the initial
    // boilerplate location. Navigating back later remains possible.
    function redirectRenderedGutenbergFrontMatter(contents) {
      if (!initialGutenbergRedirectPending) return;
      try {
        var doc = contents.document;
        var text = (doc.body ? doc.body.textContent : '')
          .replace(/\s+/g, ' ').trim().toLowerCase();
        var hasOpeningNotice =
          text.indexOf('this ebook is for the use of anyone anywhere') !== -1 &&
          text.indexOf('project gutenberg') !== -1;
        var hasStartMarker =
          text.indexOf('start of the project gutenberg ebook') !== -1;
        var hasFullLicense =
          text.indexOf('the full project gutenberg license') !== -1;
        if (!hasOpeningNotice && !hasStartMarker && !hasFullLicense) return;

        var sectionIndex = contents.sectionIndex;
        var target = null;
        var firstBookBlock = hasStartMarker
          ? blockAfterGutenbergStart(doc) : null;

        if (firstBookBlock) {
          target = contents.cfiFromNode(firstBookBlock);
          // A saved cursor later than the start marker is real reading
          // progress in a combined XHTML section and must not be replaced.
          if (initialStartCfi) {
            try {
              if (new ePub.CFI().compare(initialStartCfi, target) >= 0) return;
            } catch (e) {
              return;
            }
          }
        } else {
          markSpineExcluded(sectionIndex);
          target = hasFullLicense || sectionIndex >= spineItems().length / 2
            ? previousReadableSpineTarget(sectionIndex)
            : nextReadableSpineTarget(sectionIndex);
        }

        if (!target) return;
        initialGutenbergRedirectPending = false;
        setTimeout(function () {
          rendition.display(target).catch(function () {});
        }, 0);
      } catch (e) {}
    }

    function inspectGutenbergSection(section, index) {
      var request = book.load.bind(book);
      return section.load(request).then(function (loaded) {
        var doc = section.document || loaded;
        var text = '';
        try {
          text = (doc.body ? doc.body.textContent : doc.textContent || '')
            .replace(/\s+/g, ' ').trim().toLowerCase();
        } catch (e) {}

        var startAt = text.indexOf('start of the project gutenberg ebook');
        var endAt = text.indexOf('end of the project gutenberg ebook');
        var hasOpeningNotice =
          text.indexOf('this ebook is for the use of anyone anywhere') !== -1 &&
          text.indexOf('project gutenberg') !== -1;
        var hasFullLicense =
          text.indexOf('the full project gutenberg license') !== -1;

        if (startAt !== -1) {
          var firstBookBlock = blockAfterGutenbergStart(doc);
          if (firstBookBlock) {
            try {
              gutenbergInitialTarget = section.cfiFromElement(firstBookBlock);
            } catch (e) {
              gutenbergInitialTarget = section.href;
            }
          } else {
            markSpineExcluded(index);
            gutenbergInitialTarget = nextReadableSpineTarget(index);
          }
        } else if (hasOpeningNotice && !hasFullLicense && index < 6) {
          markSpineExcluded(index);
          gutenbergInitialTarget = nextReadableSpineTarget(index);
        }

        // A dedicated footer contains either only the end marker and license,
        // or the full license by itself. If the end marker follows substantial
        // story text, keep that section because it also contains the ending.
        if ((endAt !== -1 && endAt < 240) ||
            (hasFullLicense && endAt === -1)) {
          markSpineExcluded(index);
        }

        try { section.unload(); } catch (e) {}
      }).catch(function () {
        try { section.unload(); } catch (e) {}
      });
    }

    function prepareGutenbergSpine() {
      return book.ready.then(function () {
        var items = spineItems();
        var indexes = {};
        excludedSpineIndexes = {};
        gutenbergInitialTarget = null;

        // Filename classification is instant and covers current Gutenberg
        // EPUBs. Content inspection is limited to the book edges so opening a
        // large title does not add another visible loading phase.
        for (var i = 0; i < items.length; i++) {
          var href = (items[i].href || '').toLowerCase();
          if (/pg[-_.]?header|gutenberg[-_.]?header/.test(href)) {
            markSpineExcluded(i);
            gutenbergInitialTarget = nextReadableSpineTarget(i);
          }
          if (/pg[-_.]?footer|gutenberg[-_.]?(footer|license)/.test(href)) {
            markSpineExcluded(i);
          }
          if (i < 6 || i >= items.length - 6) indexes[i] = true;
        }

        return Promise.all(Object.keys(indexes).map(function (key) {
          var index = Number(key);
          return inspectGutenbergSection(items[index], index);
        }));
      });
    }

    function readableChapterPosition(spineIndex) {
      var items = spineItems();
      var chapter = 0, chapters = 0;
      for (var i = 0; i < items.length; i++) {
        if (excludedSpineIndexes[i]) continue;
        chapters++;
        if (i <= spineIndex) chapter = chapters;
      }
      return { chapter: chapter, chapters: chapters };
    }

    function report(loc) {
      if (!loc || !loc.start) return;
      hideSelectionToolbar();
      var cfi = loc.start.cfi;
      var percent = loc.start.percentage || 0;
      var page = 0, total = 0, chapter = 0, chapters = 0, chapterPercent = 0;
      try {
        if (typeof loc.start.index === 'number') {
          var chapterPosition = readableChapterPosition(loc.start.index);
          chapter = chapterPosition.chapter;
          chapters = chapterPosition.chapters;
        }
        var displayed = loc.start.displayed;
        if (displayed && displayed.total > 0) {
          chapterPercent = displayed.page / displayed.total;
        }
        if (locationsReady) {
          page = book.locations.locationFromCfi(cfi) + 1;
          total = book.locations.total;
          percent = book.locations.percentageFromCfi(cfi);
        }
      } catch (e) {}
      post({
        type: 'location', cfi: cfi, percent: percent, page: page, total: total,
        chapter: chapter, chapters: chapters, chapterPercent: chapterPercent
      });
    }

    // ── Called from Dart ──────────────────────────────────────────────
    window.setTheme = function (bg, fg, font, size, line, sel) {
      theme = { bg: bg, fg: fg, font: font, size: size, line: line,
                sel: sel || theme.sel };
      applyTheme();
    };
    window.nextPage = function () {
      if (rendition) rendition.next().catch(function () {});
    };
    window.prevPage = function () {
      if (rendition) rendition.prev().catch(function () {});
    };
    window.gotoCfi = function (cfi) {
      if (rendition && cfi) rendition.display(cfi).catch(function () {});
    };
    // Paint a saved highlight as a colored wash over its CFI range.
    window.applyMark = function (cfiRange, colorHex) {
      try {
        rendition.annotations.highlight(cfiRange, {}, function () {}, 'hl', {
          'fill': colorHex, 'fill-opacity': '0.35', 'mix-blend-mode': 'multiply'
        });
      } catch (e) {}
    };
    window.clearSelection = function () {
      selecting = false;
      hideSelectionToolbar();
      try {
        rendition.getContents().forEach(function (c) {
          c.window.getSelection().removeAllRanges();
        });
      } catch (e) {}
    };

    // The EPUB arrives from Dart in base64 chunks — one giant string through
    // the JS bridge is slow and can silently truncate on Android.
    var pending = [];
    window.appendChunk = function (part) { pending.push(part); };

    window.loadBook = function (startCfi, locationsJson) {
      var b64 = pending.join('');
      pending = [];
      openBook(b64ToBuffer(b64), startCfi, locationsJson);
    };

    // Web builds can let epub.js fetch the authenticated same-origin URL
    // directly. This avoids holding the EPUB, its Base64 expansion, and the
    // unzipped archive in memory at the same time on iOS Safari.
    window.loadBookUrl = function (url, startCfi, locationsJson) {
      pending = [];
      // Use the browser's modern fetch implementation instead of epub.js
      // 0.3's legacy request helper. In particular, Safari needs the session
      // cookie included when requesting the protected /me/books/... route.
      fetch(url, { credentials: 'same-origin', cache: 'default' })
        .then(function (response) {
          if (!response.ok) {
            throw new Error('EPUB request failed (' + response.status + ')');
          }
          return response.arrayBuffer();
        })
        .then(function (buffer) {
          openBook(buffer, startCfi, locationsJson);
        })
        .catch(function (e) {
          post({ type: 'error', message: String(e) });
        });
    };

    function openBook(source, startCfi, locationsJson) {
      try {
        initialStartCfi = startCfi || null;
        initialGutenbergRedirectPending = true;
        book = ePub(source);
        rendition = book.renderTo('viewer', {
          width: '100%', height: '100%',
          flow: 'scrolled-doc', spread: 'none', manager: 'continuous'
        });
        applyTheme();
        // Inspect the book while the existing reader loader is visible. A
        // saved CFI in real book content always wins. A fresh open (or an old
        // cursor saved inside boilerplate) jumps to readable book content.
        prepareGutenbergSpine()
          .catch(function () { /* ordinary/non-Gutenberg EPUB */ })
          .then(function () {
            var target = displayTargetForSavedCfi(startCfi);
            return rendition.display(target);
          })
          .then(function () {
            initialGutenbergRedirectPending = false;
            post({ type: 'ready' });
          })
          .catch(function () {
            // Bad/foreign CFI — retry from the clean initial target; if the
            // book itself is unreadable that fails too, and Dart gets an error
            // instead of an eternal spinner.
            rendition.display(gutenbergInitialTarget || undefined)
              .then(function () { post({ type: 'ready' }); })
              .catch(function (e) { post({ type: 'error', message: 'display: ' + String(e) }); });
          });
        rendition.on('relocated', report);
        // Long-press selection inside the book → hand the CFI range + text to
        // Dart, which shows the Tag/Note actions.
        rendition.on('selected', function (cfiRange, contents) {
          selecting = true;
          var text = '', rect = null;
          try {
            // A few malformed/legacy EPUBs wrap large text regions in links
            // or apply red focus styles. Long-press can focus that element;
            // retire the focus while leaving the native selection intact.
            var active = contents.document.activeElement;
            if (active && typeof active.blur === 'function') active.blur();
            var sel = contents.window.getSelection();
            text = sel.toString();
            // Selection bounds (iframe CSS px == Flutter logical px at
            // initial-scale=1) — Dart anchors the highlight palette to it.
            var r = sel.getRangeAt(0).getBoundingClientRect();
            rect = { x: r.left, y: r.top, w: r.width, h: r.height };
          } catch (e) {}
          showSelectionToolbar();
          post({ type: 'selected', cfiRange: cfiRange, text: text, rect: rect });
        });
        // No click handler on purpose: taps never turn pages, and the
        // long-press release synthesizes a click — touching the selection
        // here would kill the one the user just made. Dismissal is
        // Chromium-native; the selectionchange watchdog syncs Dart's bar.
        rendition.hooks.content.register(function (contents) {
          var doc = contents.document;

          redirectRenderedGutenbergFrontMatter(contents);

          // iOS Safari normally overlays Copy / Look Up / Translate after a
          // long press. Keep selection and its draggable handles, but suppress
          // that native callout so Marginalia's Tag / Note toolbar owns the
          // action surface. `contextmenu` covers desktop/mobile browsers that
          // implement the callout through the standard event.
          try {
            doc.documentElement.style.webkitTouchCallout = 'none';
            doc.body.style.webkitTouchCallout = 'none';
            doc.documentElement.style.webkitUserSelect = 'text';
            doc.body.style.webkitUserSelect = 'text';
          } catch (e) {}
          doc.addEventListener('contextmenu', function (ev) {
            ev.preventDefault();
          });

          // Accent selection wash on every freshly rendered section.
          installSelectionCss(contents);

          // Horizontal swipe → page turn. Passive listeners: long-press
          // selection and handle-dragging stay fully native. A swipe must
          // START MOVING immediately — any gesture that begins with a still
          // finger (the long-press-to-select shape) can never turn a page.
          // When the selection dies natively (Copy tapped, handles collapsed,
          // toolbar dismissed), retire the Flutter Tag/Note bar too.
          doc.addEventListener('selectionchange', function () {
            setTimeout(function () {
              var s = contents.window.getSelection();
              if ((!s || s.isCollapsed || !s.toString().trim()) && selecting) {
                selecting = false;
                hideSelectionToolbar();
                post({ type: 'selcleared' });
              }
            }, 300);
          });
        });
        // Global page counts need a location index. Generating one parses the
        // whole book, so prefer the cached copy Dart hands over; only a fresh
        // generate is posted back for caching.
        book.ready.then(function () {
          if (locationsJson) {
            try { book.locations.load(locationsJson); return 'cached'; }
            catch (e) { /* corrupt cache — fall through and regenerate */ }
          }
          return book.locations.generate(1200);
        }).then(function (how) {
          locationsReady = true;
          post({ type: 'total', total: book.locations.total });
          if (how !== 'cached') post({ type: 'locations', json: book.locations.save() });
          try {
            // rendition.manager is undefined when rendering never started —
            // touching currentLocation() then throws inside epub.js.
            if (rendition && rendition.manager) report(rendition.currentLocation());
          } catch (e) {}
        }).catch(function (e) { post({ type: 'error', message: 'open: ' + String(e) }); });
      } catch (e) { post({ type: 'error', message: String(e) }); }
    }
  </script>
</body>
</html>
