<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    html, body, #viewer {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--reader-bg, #faf8f5);
    }
    #viewer { color: var(--reader-fg, #1c1c1e); }
  </style>
</head>
<body>
  <div id="viewer" aria-label="Google Books sample"></div>
  <script>
    var apiReady = false;
    var requestedIdentifier = null;
    var viewer = null;

    function post(message) {
      var encoded = JSON.stringify(message);
      try { SampleChannel.postMessage(encoded); return; } catch (e) {}
      try { window.parent.postMessage(encoded, '*'); } catch (e) {}
    }

    function setTheme(bg, fg, font, size, line, accent) {
      document.documentElement.style.setProperty('--reader-bg', bg);
      document.documentElement.style.setProperty('--reader-fg', fg);
      document.body.style.background = bg;
    }

    function initializeViewer() {
      if (!apiReady || !requestedIdentifier || viewer) return;
      try {
        viewer = new google.books.DefaultViewer(
          document.getElementById('viewer')
        );
        viewer.load(
          requestedIdentifier,
          function () {
            viewer = null;
            post({
              type: 'error',
              message: 'Google does not allow this sample to be embedded.'
            });
          },
          function () { post({ type: 'ready' }); }
        );
      } catch (e) {
        viewer = null;
        post({ type: 'error', message: 'Could not open this sample.' });
      }
    }

    window.loadSample = function (identifier, bg, fg, accent) {
      requestedIdentifier = identifier;
      setTheme(bg, fg, '', 0, 0, accent);
      initializeViewer();
    };

    window.addEventListener('message', function (event) {
      var data = event.data;
      if (typeof data === 'string') {
        try { data = JSON.parse(data); } catch (e) { return; }
      }
      if (!data || typeof data.cmd !== 'string') return;
      var fn = window[data.cmd];
      if (typeof fn === 'function') fn.apply(null, data.args || []);
    });

    var loader = document.createElement('script');
    loader.src = 'https://www.google.com/books/jsapi.js';
    loader.onload = function () {
      try {
        google.books.load();
        google.books.setOnLoadCallback(function () {
          apiReady = true;
          initializeViewer();
        });
      } catch (e) {
        post({ type: 'error', message: 'Could not load Google Books.' });
      }
    };
    loader.onerror = function () {
      post({ type: 'error', message: 'Could not connect to Google Books.' });
    };
    document.head.appendChild(loader);
  </script>
</body>
</html>
