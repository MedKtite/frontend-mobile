name: marginalia
description: "Marginalia — literary reading & annotation app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1

  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  path_provider: ^2.1.4

  go_router: ^14.2.7

  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.5.3
  device_info_plus: ^11.3.0
  package_info_plus: ^8.3.0

  intl: ^0.19.0
  google_fonts: ^6.2.1

  flutter_svg: ^2.3.0
  file_picker: ^11.0.2
  # Used directly only to re-style epub_view's paragraph HTML (inline highlight
  # marks); the version is already pinned transitively by epub_view.
  flutter_html: ^3.0.0
  pdfx: ^2.9.2
  epub_view: ^3.2.0
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.1
  # Audiobook playback (Listen Now) — streams the presigned S3 URL.
  just_audio: ^0.9.40
  # In-app purchases via RevenueCat (brokers App Store / Play Store IAP —
  # the store-legal path for digital goods; backend webhook already built).
  purchases_flutter: ^8.0.0
  # iOS-26-style liquid glass (nav bar). Impeller-only — every use MUST gate on
  # ImageFilter.isShaderFilterSupported and keep a BackdropFilter fallback
  # (CLAUDE.md §11: the fallback is what runs under `flutter test` on Windows).
  liquid_glass_renderer: ^0.2.0-dev.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


  freezed: ^2.5.7
  json_serializable: ^6.8.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/icons/social/
    - assets/reader/
    - lib/assets/images/
